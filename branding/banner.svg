<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1680 720"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-labelledby="bannerTitle bannerDesc">
  <title id="bannerTitle">claude-blog: AI-Powered Blog Authority</title>
  <desc id="bannerDesc">
    Banner for the claude-blog skill suite. Purple terminal aesthetic.
    30 sub-skills, 5 agents, 5-gate Blog Delivery Contract.
    Dual-optimized for Google rankings and AI citations.
  </desc>

  <defs>
    <linearGradient id="bgGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#1A1612"/>
      <stop offset="60%"  stop-color="#110E0B"/>
      <stop offset="100%" stop-color="#060504"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.40"/>
    </radialGradient>

    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C9B3E6"/>
      <stop offset="35%"  stop-color="#9075BD"/>
      <stop offset="65%"  stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#3F2C5C"/>
    </linearGradient>

    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7B5EA7"/>
      <stop offset="50%"  stop-color="#B49DD6"/>
      <stop offset="100%" stop-color="#7B5EA7"/>
    </linearGradient>

    <pattern id="scanlines" x="0" y="0" width="100%" height="5" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100%" height="5" fill="transparent"/>
      <line x1="0" y1="0" x2="2000" y2="0" stroke="#060504" stroke-opacity="0.55" stroke-width="1.4"/>
    </pattern>

    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1680" height="720" fill="url(#bgGrad)"/>

  <rect x="0" y="0" width="1680" height="32" fill="#0A0807"/>
  <line x1="0" y1="32" x2="1680" y2="32" stroke="#7B5EA7" stroke-opacity="0.22" stroke-width="1"/>
  <g font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace"
     font-size="11" letter-spacing="1.6">
    <circle cx="22" cy="16" r="3.4" fill="#7B5EA7" filter="url(#dotGlow)">
      <animate attributeName="opacity"
               values="0.45;1;0.45"
               dur="1.6s"
               repeatCount="indefinite"/>
    </circle>
    <text x="36" y="20" fill="#3F2C5C" font-weight="600">SYS . CLAUDE-BLOG</text>
    <text x="240" y="20" fill="#3F2C5C">NODE 0x2A . ACTIVE</text>
    <text x="1658" y="20" text-anchor="end" fill="#5A5750">UPTIME 12:08:33</text>
  </g>

  <g transform="translate(80, 0)" font-family="Inter, system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif">
    <text x="0" y="240"
          font-size="148"
          font-weight="900"
          letter-spacing="-4"
          fill="url(#wordGrad)"
          filter="url(#softGlow)">CLAUDE</text>
    <rect x="-4" y="120" width="660" height="138" fill="url(#scanlines)" pointer-events="none"/>

    <text x="0" y="380"
          font-size="148"
          font-weight="900"
          letter-spacing="-4"
          fill="url(#wordGrad)"
          filter="url(#softGlow)">BLOG</text>
    <rect x="-4" y="260" width="500" height="138" fill="url(#scanlines)" pointer-events="none"/>
  </g>

  <rect x="80" y="420" width="560" height="3" rx="1.5" fill="url(#dividerGrad)">
    <animate attributeName="opacity"
             values="0.72;1.0;0.72"
             dur="6s"
             repeatCount="indefinite"/>
  </rect>

  <text x="80" y="478"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="32"
        font-weight="500"
        fill="#F5F4ED"
        letter-spacing="-0.3">AI-Powered Blog Authority</text>

  <text x="80" y="512"
        font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="12"
        fill="#5A5750"
        letter-spacing="2">
    <tspan fill="#7B5EA7" font-weight="700">&gt; </tspan>RUNTIME READY . 30 SUB-SKILLS . 5 AGENTS . 5-GATE CONTRACT
  </text>

  <g transform="translate(1100, 180)"
     font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace">
    <text x="500" y="0"
          font-size="11"
          fill="#7B5EA7"
          letter-spacing="2"
          opacity="0.7"
          text-anchor="end">
      <tspan fill="#3F2C5C">[ </tspan>COMMAND PALETTE<tspan fill="#3F2C5C"> ]</tspan>
    </text>

    <g font-size="30" fill="#5A5750" letter-spacing="0.5" text-anchor="end">
      <text x="500" y="55"><tspan fill="#3F2C5C">/</tspan>blog write</text>
      <text x="500" y="100"><tspan fill="#3F2C5C">/</tspan>blog audit</text>
      <text x="500" y="145"><tspan fill="#3F2C5C">/</tspan>blog cluster</text>
      <text x="500" y="190" fill="#F5F4ED"><tspan fill="#7B5EA7">/</tspan>blog geo</text>
      <text x="500" y="235"><tspan fill="#3F2C5C">/</tspan>blog multilingual</text>
      <text x="500" y="280"><tspan fill="#3F2C5C">/</tspan>blog factcheck</text>
      <text x="500" y="325"><tspan fill="#3F2C5C">/</tspan>blog flow <tspan fill="#3F2C5C" opacity="0.7">&lt;type&gt;</tspan></text>
    </g>
  </g>

  <line x1="0" y1="688" x2="1680" y2="688" stroke="#7B5EA7" stroke-opacity="0.22" stroke-width="1"/>
  <rect x="0" y="688" width="1680" height="32" fill="#0A0807"/>
  <g font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace"
     font-size="11" letter-spacing="1.6">
    <circle cx="22" cy="704" r="3.4" fill="#7B5EA7" filter="url(#dotGlow)">
      <animate attributeName="opacity"
               values="0.45;1;0.45"
               dur="1.6s"
               repeatCount="indefinite"/>
    </circle>
    <text x="36" y="708" fill="#3F2C5C" font-weight="600">LINK . STABLE</text>
    <text x="200" y="708" fill="#3F2C5C">BUF 1024K</text>
    <text x="310" y="708" fill="#3F2C5C">V1.9.0</text>
    <text x="1420" y="708" text-anchor="end" fill="#5A5750">208.140.MAINFRAME.AGRICIDANIEL</text>
    <text x="1658" y="708" text-anchor="end" fill="#5A5750">12:08:34 UTC</text>
  </g>

  <rect width="1680" height="720" fill="url(#vignette)" pointer-events="none"/>
</svg>
